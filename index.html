<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Pookie! ✨</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero-section">
        <div class="glass-container">
            <h1 class="pookie-title" data-aos="fade-down" data-aos-delay="300">
                Happy Birthday! 🎂
            </h1>
            
            <div class="pookie-lottie" data-aos="zoom-in" data-aos-delay="600">
                <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
                <lottie-player src="https://assets4.lottiefiles.com/packages/lf20_9x9p0z.json"  background="transparent" speed="1" style="width: 200px; height: 200px;" loop autoplay></lottie-player>
            </div>
            
            <button id="giftBtn" data-aos="fade-up" data-aos-delay="900">
                Click for a surprise 🎁
            </button>
        </div>
    </section>

    <section id="messageSection" class="hidden message-section">
        <div class="message-card" data-aos="flip-left">
            <h2 class="letter-title">Dear [Dost Ka Naam], ❤️</h2>
            <p class="typing-text">You are my absolute favorite person! A truly amazing 'Pookie'. I hope this year brings you infinite joy and beautiful moments. I'm so lucky to have you. ✨</p>
        </div>
    </section>

    <section id="memoriesSection" class="hidden memories-section">
        <h2 class="section-title" data-aos="fade-up">Sweetest Memories 📸</h2>
        <div class="memory-grid">
            <div class="memory-item" data-aos="zoom-in"><img src="images/pic1.webp" alt="Memory"></div>
            <div class="memory-item" data-aos="zoom-in" data-aos-delay="200"><img src="images/pic2.webp" alt="Memory"></div>
            <div class="memory-item" data-aos="zoom-in" data-aos-delay="400"><img src="images/pic3.webp" alt="Memory"></div>
            <div class="memory-item" data-aos="zoom-in" data-aos-delay="600"><img src="images/pic4.webp" alt="Memory"></div>
        </div>
    </section>

    <audio id="bgMusic" loop>
        <source src="music/pookie_song.mp3" type="audio/mpeg">
    </audio>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true }); // Initialize AOS
    </script>
    <script src="script.js"></script>
</body>
</html>
